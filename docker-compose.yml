# Local development stack
# Run: docker compose up
# Or for Python-only local dev: python -m adapters.local.dev_server
#
# To use Ollama (free AI, no API key needed):
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up
#   # First time: pull a model inside the container:
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml exec ollama ollama pull llama3.2:3b
#
# To use Anthropic API:
#   Set ANTHROPIC_API_KEY in .env, then: docker compose up

services:
  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    command: ["python", "-m", "adapters.local.dev_server"]
    ports:
      - "8080:8080"
    environment:
      - T3NETS_ENV=local
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-}
    volumes:
      - ./agent:/app/agent          # Hot reload
      - ./adapters:/app/adapters    # Hot reload
      - ./data:/app/data            # SQLite + local files
    env_file:
      - .env
