<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3nets — Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 0;
            height: 48px;
        }

        .nav-brand {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-right: 24px;
            text-decoration: none;
        }

        .nav-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 600;
            margin-left: 6px;
            vertical-align: middle;
        }
        .nav-badge.platform { background: #22c55e; color: #000; }
        .nav-badge.stage { background: #3b82f6; color: #fff; }

        .nav-tenant-name {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-left: 12px;
            padding-left: 12px;
            border-left: 1px solid #333;
        }

        .nav-links {
            display: flex;
            gap: 0;
            height: 100%;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            height: 100%;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .nav-links a:hover { color: #ccc; background: #ffffff08; }
        .nav-links a.active { color: #fff; border-bottom-color: #3b82f6; }

        .nav-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .settings-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 24px;
            width: 100%;
        }

        .settings-header {
            margin-bottom: 32px;
        }

        .settings-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .settings-header p {
            font-size: 13px;
            color: #666;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .model-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .model-option {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-option:hover:not(.disabled) {
            border-color: #3b82f6;
            background: #1e1e2e;
        }

        .model-option.selected {
            border-color: #3b82f6;
            background: #1e1e2e;
            box-shadow: 0 0 0 1px #3b82f6;
        }

        .model-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .model-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #444;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .model-option.selected .model-radio {
            border-color: #3b82f6;
        }

        .model-option.selected .model-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
        }

        .model-info {
            flex: 1;
        }

        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .model-option.disabled .model-name {
            color: #888;
        }

        .model-id {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
            font-family: "SF Mono", "Fira Code", Menlo, monospace;
        }

        .model-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .model-tag.bedrock-only {
            background: #78350f;
            color: #fbbf24;
        }

        .model-tag.current {
            background: #065f46;
            color: #6ee7b7;
        }

        /* --- Skills toggle --- */
        .skill-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .skill-item {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skill-toggle {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .skill-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .skill-toggle .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #333;
            border-radius: 22px;
            transition: 0.2s;
        }

        .skill-toggle .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #888;
            left: 3px;
            bottom: 3px;
            transition: 0.2s;
        }

        .skill-toggle input:checked + .slider {
            background: #1d4ed8;
        }

        .skill-toggle input:checked + .slider::before {
            transform: translateX(18px);
            background: #fff;
        }

        .skill-info {
            flex: 1;
        }

        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .skill-desc {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .skill-integration-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            background: #78350f;
            color: #fbbf24;
        }

        /* --- Limits / form fields --- */
        .settings-field {
            margin-bottom: 16px;
        }

        .settings-field label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }

        .settings-field input[type="number"],
        .settings-field textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 10px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .settings-field input[type="number"] {
            max-width: 200px;
        }

        .settings-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .settings-field input:focus,
        .settings-field textarea:focus {
            border-color: #3b82f6;
        }

        .save-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .save-btn:hover {
            background: #2563eb;
        }

        .save-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #065f46;
            color: #6ee7b7;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">T3nets <span class="nav-badge platform" id="platform-badge">...</span><span class="nav-badge stage" id="stage-badge">...</span></a><span class="nav-tenant-name" id="nav-tenant-name" style="display:none;"></span>
        <div class="nav-links">
            <a href="/chat">Chat</a>
            <a href="/health">Health</a>
            <a href="/settings" class="active">Settings</a>
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="settings-container">
        <div class="settings-header">
            <h1>Settings</h1>
            <p>Configure your T3nets agent</p>
        </div>

        <div class="section-title">AI Model</div>
        <div id="model-list" class="model-list">
            <!-- Populated by JS -->
        </div>

        <div class="section-title" style="margin-top: 32px;">Skills</div>
        <div id="skill-list" class="skill-list">
            <!-- Populated by JS -->
        </div>

        <div class="section-title" style="margin-top: 32px;">Agent Settings</div>

        <div class="settings-field">
            <label for="system-prompt">System Prompt Override</label>
            <textarea id="system-prompt" placeholder="Leave blank to use the default system prompt..."></textarea>
        </div>

        <div class="settings-field">
            <label for="max-tokens">Max Tokens per Message</label>
            <input type="number" id="max-tokens" min="256" max="16384" step="256">
        </div>

        <div class="settings-field">
            <label for="messages-per-day">Messages per Day Limit</label>
            <input type="number" id="messages-per-day" min="1" max="100000" step="1">
        </div>

        <div class="settings-field">
            <label for="max-history">Conversation History Length</label>
            <input type="number" id="max-history" min="1" max="100" step="1">
        </div>

        <button class="save-btn" id="save-agent-btn" onclick="saveAgentSettings()">Save Agent Settings</button>

        <div style="margin-top: 48px; padding-top: 16px; border-top: 1px solid #2a2a2a;">
            <span style="font-size: 12px; color: #555;">Build <span id="build-number">—</span></span>
        </div>
    </div>

    <div id="toast" class="toast">Model updated</div>

    <script>
        // --- Auth helper ---
        function getAuthHeaders() {
            const token = localStorage.getItem('t3nets_id_token');
            if (token) return { 'Authorization': 'Bearer ' + token };
            return {};
        }

        async function checkAuth() {
            try {
                const resp = await fetch('/api/auth/config');
                const config = await resp.json();
                if (config.enabled) {
                    const token = localStorage.getItem('t3nets_id_token');
                    if (!token) { window.location.href = '/login'; return; }
                    document.getElementById('logout-btn').style.display = 'inline-block';
                    try {
                        const meResp = await fetch('/api/auth/me', { headers: getAuthHeaders() });
                        if (meResp.ok) {
                            const me = await meResp.json();
                            if (me.tenant_name) {
                                const tn = document.getElementById('nav-tenant-name');
                                tn.textContent = me.tenant_name;
                                tn.style.display = 'inline';
                            }
                        }
                    } catch (e) { /* /api/auth/me not available */ }
                } else {
                    // Local mode — still fetch tenant name
                    try {
                        const meResp = await fetch('/api/auth/me');
                        if (meResp.ok) {
                            const me = await meResp.json();
                            if (me.tenant_name) {
                                const tn = document.getElementById('nav-tenant-name');
                                tn.textContent = me.tenant_name;
                                tn.style.display = 'inline';
                            }
                        }
                    } catch (e) { /* /api/auth/me not available */ }
                }
            } catch (e) { /* auth not available — continue without */ }
        }

        function logout() {
            localStorage.removeItem('t3nets_id_token');
            localStorage.removeItem('t3nets_access_token');
            localStorage.removeItem('t3nets_refresh_token');
            window.location.href = '/login';
        }

        checkAuth();

        let currentModel = '';
        let provider = 'anthropic';
        let settingsData = {};

        async function loadSettings() {
            try {
                const resp = await fetch('/api/settings', { headers: getAuthHeaders() });
                const data = await resp.json();
                settingsData = data;
                currentModel = data.ai_model || '';
                provider = data.provider || 'anthropic';
                if (data.platform) {
                    document.getElementById('platform-badge').textContent = data.platform.toUpperCase();
                }
                if (data.stage) {
                    document.getElementById('stage-badge').textContent = data.stage.toUpperCase();
                }
                if (data.build) {
                    document.getElementById('build-number').textContent = data.build;
                }
                renderModels(data.models || []);
                renderSkills(data.available_skills || [], data.enabled_skills || []);

                // Populate agent settings fields
                document.getElementById('system-prompt').value = data.system_prompt_override || '';
                document.getElementById('max-tokens').value = data.max_tokens_per_message || 4096;
                document.getElementById('messages-per-day').value = data.messages_per_day || 1000;
                document.getElementById('max-history').value = data.max_conversation_history || 20;
            } catch (err) {
                console.error('Failed to load settings:', err);
            }
        }

        function renderSkills(available, enabled) {
            const list = document.getElementById('skill-list');
            list.innerHTML = '';

            if (available.length === 0) {
                list.innerHTML = '<div style="color:#555;font-size:13px;">No skills registered</div>';
                return;
            }

            for (const skill of available) {
                const isEnabled = enabled.includes(skill.name);
                const div = document.createElement('div');
                div.className = 'skill-item';

                let tagHtml = '';
                if (skill.requires_integration) {
                    tagHtml = `<span class="skill-integration-tag">${skill.requires_integration}</span>`;
                }

                div.innerHTML = `
                    <label class="skill-toggle">
                        <input type="checkbox" data-skill="${skill.name}" ${isEnabled ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <div class="skill-info">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.description}</div>
                    </div>
                    ${tagHtml}
                `;

                const checkbox = div.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', () => toggleSkill(skill.name, checkbox.checked));
                list.appendChild(div);
            }
        }

        async function toggleSkill(skillName, enabled) {
            // Collect current enabled skills from all checkboxes
            const checkboxes = document.querySelectorAll('#skill-list input[type="checkbox"]');
            const enabledSkills = [];
            checkboxes.forEach(cb => {
                if (cb.checked) enabledSkills.push(cb.dataset.skill);
            });

            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ enabled_skills: enabledSkills }),
                });
                if (resp.ok) {
                    showToast(enabled ? `${skillName} enabled` : `${skillName} disabled`);
                } else {
                    const err = await resp.json();
                    showToast(err.error || 'Failed to update skills');
                    loadSettings(); // Revert UI
                }
            } catch (err) {
                showToast('Failed to update skills');
                loadSettings();
            }
        }

        async function saveAgentSettings() {
            const btn = document.getElementById('save-agent-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const payload = {
                system_prompt_override: document.getElementById('system-prompt').value,
                max_tokens_per_message: parseInt(document.getElementById('max-tokens').value) || 4096,
                messages_per_day: parseInt(document.getElementById('messages-per-day').value) || 1000,
                max_conversation_history: parseInt(document.getElementById('max-history').value) || 20,
            };

            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify(payload),
                });
                if (resp.ok) {
                    showToast('Agent settings saved');
                } else {
                    const err = await resp.json();
                    showToast(err.error || 'Failed to save settings');
                }
            } catch (err) {
                showToast('Failed to save settings');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Agent Settings';
            }
        }

        function renderModels(models) {
            const list = document.getElementById('model-list');
            list.innerHTML = '';

            for (const model of models) {
                const div = document.createElement('div');
                div.className = 'model-option';

                const isSelected = model.id === currentModel;
                const isDisabled = !model.available;

                if (isSelected) div.classList.add('selected');
                if (isDisabled) div.classList.add('disabled');

                let tagHtml = '';
                if (isSelected) {
                    tagHtml = '<span class="model-tag current">Current</span>';
                } else if (isDisabled) {
                    tagHtml = '<span class="model-tag bedrock-only">Bedrock only</span>';
                }

                div.innerHTML = `
                    <div class="model-radio"></div>
                    <div class="model-info">
                        <div class="model-name">${model.display_name}</div>
                        <div class="model-id">${model.id}</div>
                    </div>
                    ${tagHtml}
                `;

                if (!isDisabled) {
                    div.addEventListener('click', () => selectModel(model.id));
                }

                list.appendChild(div);
            }
        }

        async function selectModel(modelId) {
            if (modelId === currentModel) return;

            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ ai_model: modelId }),
                });

                if (resp.ok) {
                    currentModel = modelId;
                    loadSettings();
                    showToast('Model updated');
                }
            } catch (err) {
                console.error('Failed to update model:', err);
                showToast('Failed to update model');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        loadSettings();
    </script>
</body>
</html>
